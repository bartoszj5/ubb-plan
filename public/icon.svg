<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D7377"/>
      <stop offset="100%" stop-color="#0A5C5F"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4942A"/>
      <stop offset="100%" stop-color="#A87D22"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="72" y="120" width="368" height="320" rx="28" fill="#FFFFFF" opacity="0.95"/>

  <!-- Calendar header bar -->
  <rect x="72" y="120" width="368" height="80" rx="28" fill="url(#header)"/>
  <rect x="72" y="160" width="368" height="40" fill="url(#header)"/>

  <!-- Calendar rings -->
  <rect x="152" y="92" width="20" height="56" rx="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="340" y="92" width="20" height="56" rx="10" fill="#FFFFFF" opacity="0.9"/>

  <!-- UBB text -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="800" fill="#0D7377" letter-spacing="-2">UBB</text>

  <!-- Schedule lines -->
  <rect x="120" y="370" width="120" height="8" rx="4" fill="#0D7377" opacity="0.2"/>
  <rect x="120" y="394" width="180" height="8" rx="4" fill="#0D7377" opacity="0.15"/>

  <!-- Dots for calendar grid suggestion -->
  <circle cx="172" cy="166" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="220" cy="166" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="268" cy="166" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="316" cy="166" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="364" cy="166" r="6" fill="#FFFFFF" opacity="0.5"/>
</svg>
